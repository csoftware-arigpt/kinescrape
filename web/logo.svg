    <tspan fill="url(#kx-ink)">kine</tspan><tspan fill="url(#kx-accent)">scrape</tspan>
  </text>
  <text x="240" y="252" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="12" letter-spacing="3" fill="#7e8a99">KINESCOPE  -&gt;  MP4  -&gt;  YOU</text>
</svg>
