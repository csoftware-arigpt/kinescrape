<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 280" role="img" aria-label="Kinescrape">
  <defs>
    <linearGradient id="kx-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#181818"/>
      <stop offset="1" stop-color="#050505"/>
    </linearGradient>
    <linearGradient id="kx-accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#68e8c4"/>
      <stop offset="1" stop-color="#4f9cff"/>
    </linearGradient>
    <linearGradient id="kx-ink" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#cfd6dd"/>
    </linearGradient>
  </defs>
  <g transform="translate(160 10)">
    <rect width="160" height="160" rx="36" fill="url(#kx-bg)"/>
    <g transform="translate(4 0)">
      <path d="M32 32 L56 32 L56 72 L104 32 L128 32 L76 80 L128 128 L104 128 L56 88 L56 128 L32 128 Z" fill="#ffffff"/>
      <path d="M86 60 L120 80 L86 100 Z" fill="url(#kx-accent)"/>
